{% extends "layout.html" %}

{% block title %}チーム一覧{% endblock %}

{% block content %}
    <h1>チーム一覧</h1>
    
    <div class="list-group">
        {% for team in teams %}
            <div class="list-group-item">
                <a href="{{ url_for('main.team', id=team.id) }}">{{ team.name }}</a>
            </div>
        {% endfor %}
    </div>   
{% endblock %}
